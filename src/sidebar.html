<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-ua-compatible" content="IE=edge" />
    <meta
      name="description"
      content="avro.im - Bangla typing tool for the Web. Use Avro Phonetic on your browser without installing any additional tool."
    />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Avro (অভ্র) Sidebar</title>
    <link
      rel="stylesheet"
      href="vendor/jquery.atwho/dist/css/jquery.atwho.css"
      type="text/css"
      media="screen"
    />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <link rel="stylesheet" href="css/misc.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="icon" href="images/apple-touch-icon.png" />
  </head>

  <body>
    <div id="sidebar_wrapper" class="cf">
      <div class="cf toggle flex justify-between config_panel items-center" id="sidebar_config_panel">
        <div>
          <div class="desktop-only left">টাইপ মোড&nbsp;&nbsp;</div>
          <div class="swipe left">
            <div>swipe anywhere to switch</div>
          </div>
          <span class="switch left">
            <input type="checkbox" id="state" checked="" />
            <label for="state" data-on="বাংলা" data-off="ইংলিশ"></label>
          </span>
        </div>
        <div class="flex gap-2">
          <div class="mode_label">থিম</div>
          <span class="switch mode_switch">
            <input type="checkbox" id="myCheckbox" checked="" />
            <label for="myCheckbox" data-on="ডার্ক" data-off="লাইট"></label>
          </span>
        </div>
        <button id="copy-btn" title="Copy to Clipboard">
          কপি
        </button>
      </div>
      <main id="sidebar_main">
        <div class="content">
          <textarea
            id="sidebar_typing_area"
            disabled="true"
            placeholder="এখানে লিখুন"
            spellcheck="false"
            autocapitalize="off"
            autocomplete="off"
            autocorrect="off"
          ></textarea>
        </div>
      </main>
      <footer id="sidebar_footer">
        <div class="wrapper">
          <div class="drafts">
            <div
              class="flex items-center justify-between align-center drafts-section"
            >
              <div class="flex items-center align-center gap-2">
                <img
                  src="./images/drafts.svg"
                  alt=""
                  width="20px"
                  height="20px"
                />
                <h2>ড্রাফট সমূহ (<span id="draft_count">0</span>)</h2>
              </div>
              <button id="add_draft" class="btn">+ নতুন ড্রাফট</button>
            </div>
            <ul>
              <li><a href="#">ড্রাফট ১</a><button class="delete-draft" title="ড্রাফট মুছুন">&times;</button></li>
            </ul>
          </div>
        </div>
      </footer>
    </div>
    <script src="vendor/jquery/dist/jquery.js"></script>
    <script src="vendor/Caret.js/src/jquery.caret.js"></script>
    <script src="vendor/jquery.atwho/dist/js/jquery.atwho.js"></script>
    <script src="vendor/jquery-autosize/jquery.autosize.js"></script>
    <script src="vendor/jquery-touchswipe/jquery.touchSwipe.js"></script>
    <script src="vendor/device.js/lib/device.js"></script>
    <script src="js/avro.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/misc.js"></script>
  </body>
</html>
